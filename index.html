<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Magic Calculator</title>
<style>
  /* [保持你原本的 CSS 完全不動] */
  html, body { background-color: #000000; width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; position: fixed; inset: 0; overscroll-behavior: none; -webkit-font-smoothing: antialiased; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-user-select: none; user-select: none; touch-action: manipulation; }
  body { display: flex; justify-content: center; align-items: flex-end; }
  .calculator { width: 100%; max-width: 414px; height: 100%; max-height: 900px; padding: 8px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end; position: relative; padding-top: max(140px, env(safe-area-inset-top)); padding-bottom: 5px; background-color: #000000; }
  .status-bar { position: absolute; top: 0; left: 0; width: 100%; box-sizing: border-box; padding-left: 20px; padding-right: 20px; display: flex; justify-content: space-between; align-items: center; padding-top: max(15px, env(safe-area-inset-top)); color: white; z-index: 10; }
  /* 時鐘 Icon 的專屬樣式 */
  .icon { 
    width: 38px; 
    height: 38px; 
    stroke: white; /* 邊框線條白色 */
    fill: none;    /* 重要：內部透明 */
  }
  .icon-calc-app { width: 32px; height: 32px; cursor: pointer; }
  .screen-container {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: flex-end;
    width: 100%;
    padding-right: 2px; /* 增加右側內邊距，防止被切斷 */
    box-sizing: border-box;
  }
  /* 修正：歷史資料區 width 100% 且不留 padding */
  .formula-display { 
    color: #a5a5a5; font-size: 28px; font-weight: 400; white-space: nowrap; 
    height: 48px; line-height: 40px; margin-bottom: -10px; 
    width: 130%; text-align: right; overflow-x: auto; scrollbar-width: none; 
    opacity: 0; transition: opacity 0.3s; padding: 0; box-sizing: border-box;
  }
  .formula-display.visible { opacity: 1; }
  .formula-display::-webkit-scrollbar { display: none; }

  .display {
      color: #fff;
      font-size: 70px; /* 預設大小 */
      text-align: right;
      width: 100%;
      height: 80px;
      line-height: 80px;
      white-space: nowrap;
      overflow-x: auto; /* 允許往左滑動查看前面的數字 */
      scrollbar-width: none; /* 隱藏捲軸 */
      transition: font-size 0.2s ease-out;
      /* 確保數字靠右 */

    }
  .display::-webkit-scrollbar { display: none; }  .display::-webkit-scrollbar { display: none; }
  .display.small-result { font-size: 55px; }
  .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
  button { width: 100%; aspect-ratio: 1; border-radius: 50%; border: none; font-size: 34px; font-weight: 400; color: #fff; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; transition: filter 0.2s; margin: 0 auto; display: flex; justify-content: center; align-items: center; padding: 0; }
  button:active { filter: brightness(1.3); }

  /* 頂部狀態列佈局 */
  .status-bar {
    position: absolute;
    top: 0; left: 0; width: 100%;
    padding: max(20px, env(safe-area-inset-top)) 20px 0 20px;
    box-sizing: border-box;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }

  /* 果凍感底盤：精確仿照圖片光澤 */
  /* 頂部圖示底盤：對角線光澤果凍感 */
  .icon-wrapper {
    position: relative;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    
    /* 基礎背景 (深灰黑) */
    background: #151515; 
    
    /* 毛玻璃效果 */
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    /* 複合式多層陰影：達成左上與右下光澤 */
    box-shadow: 
      /* 1. 外部極細亮邊 (讓邊界清晰) */
      0 0 0 0.5px rgba(255, 255, 255, 0.1),
      
      /* 2. 左上角內部高光 (強光) */
      inset 0.3px 0.3px 0.8px rgba(255, 255, 255, 0.45),
      
      /* 3. 右下角內部反光 (次要弱光，增加透明度感) */
      inset -0.3px -0.3px 1px rgba(255, 255, 255, 0.1),
      
      /* 4. 內部中心深度 (加強凹陷與立體感) */
      inset 0 0 8px rgba(0, 0, 0, 0.5),
      
      /* 5. 底部外陰影 (浮空感) */
      0 8px 15px rgba(0, 0, 0, 0.6);

    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-sizing: border-box;
    transition: all 0.2s ease;
  }

  /* 按下時的縮小感 */
  .icon-wrapper:active {
    transform: scale(0.92);
    box-shadow: inset 1px 1px 2px rgba(255, 255, 255, 0.2);
  }
  /* 灰色按鈕的基礎樣式 */
.btn-grey { 
    background-color: #616161; 
    color: #ffffff; 
    font-size: 32px;      /* 稍微調大一點 */
    display: flex; 
    justify-content: center; 
    align-items: center; 
}
/* 針對需要更大字體的按鈕 */
.btn-larger {
    font-size: 36px;
}
  .btn-grey svg { width: 35px; height: 35px; stroke: #ffffff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .btn-dark-grey { background-color: #333333; }
  .btn-orange { background-color: #ff9f0a; }
/* 橘色按鈕 (運算符號) 設定 */
/* 讓所有橘色運算符號更粗 */
.btn-orange { 
    background-color: #ff9f0a; 
    font-size: 45px; 
    font-weight: 700; /* 加粗 */
    color: white;
}

/* 針對減號按鈕的特殊加長加粗 SVG */
.minus-svg {
    width: 28px;
    height: 6px;
    background-color: white;
    border-radius: 3px; /* 讓邊緣圓潤 */
}
    /* 專門加長減號按鈕的符號 */
  .btn-minus {
    font-family: Arial, sans-serif; /* 使用更標準的減號字體 */
    letter-spacing: -2px; /* 微調字距 */
  }
  
  /* 或者使用更直接的放大縮放 (如果 font-size 不夠長) */
  .btn-minus::before {
    content: "—"; /* 使用長破折號代替短減號 */
    position: absolute;
    font-size: 30px;
  }
  /* 讓橘色運算按鈕裡的 SVG 符號更顯眼 */
.btn-orange svg {
    width: 32px;  /* 符號寬度 */
    height: 32px; /* 符號高度 */
    stroke: white;
    stroke-width: 4; /* 加粗 */
    stroke-linecap: round;
}
  /* 隱藏原本的短減號，只顯示我們加長的那個 */
  .btn-minus span { visibility: hidden; }
  /* 隱藏設定面板樣式 (不干擾 UI) */
  #settings-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
  .setting-item label { color: #ff9f0a; font-size: 20px; font-weight: bold; text-align: left; }
  input { width: 60%; padding: 15px; font-size: 20px; color: #fff; background: #333; border: none; border-radius: 10px; text-align: center; }
</style>
</head>
<body>

<!-- 設定面板 -->
<div id="settings-panel">
  <div class="setting-item">
    <label>強制結果 (留空則用時間):</label>
    <input type="text" id="forced-input" placeholder="例如: 20260708">
  </div>
  <div class="setting-item">
    <label>觀眾輸入組數 (第 N 個+號觸發):</label>
    <input type="number" id="people-count" value="2">
  </div>
  <div class="setting-item">
    <label>每組輸入幾位數 (例如 5 位):</label>
    <input type="number" id="digit-count" value="6">
  </div>
  <button onclick="saveSettings()" style="padding:15px 50px; background:#ff9f0a; color:white; border:none; border-radius:30px; font-size:18px; font-weight:bold;">儲存並開啟魔術</button>
</div>

<div class="calculator">
  <div class="status-bar">
  <!-- 將此 SVG 替換你原本的時鐘圖示 SVG -->
     <!-- 時鐘圖示底盤 -->
     <div class="icon-wrapper" onclick="toggleSettings()">
      <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- 外圈：設定較粗的 stroke-width="2.5" -->
        <circle cx="12" cy="12" r="8.5" stroke="white" stroke-width="2.5" stroke-linecap="round" />
        
        <!-- 指針：設定較細的 stroke-width="1.2" -->
        <line x1="12" y1="12" x2="12" y2="7" stroke="white" stroke-width="2" stroke-linecap="round" />
        <line x1="12" y1="12" x2="7" y2="12" stroke="white" stroke-width="2" stroke-linecap="round" />
      </svg>
    </div>
     <!-- 計算機圖示底盤 -->
    <div class="icon-wrapper" onclick="toggleSettings()">
      <svg class="icon-calc-app" onclick="document.getElementById('settings-panel').style.display='flex'" viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="100" height="130" rx="15" ry="15" fill="white" />
        <rect x="15" y="12" width="70" height="35" rx="8" ry="8" fill="black" />
        <circle cx="25" cy="65" r="10" fill="black" /><circle cx="50" cy="65" r="10" fill="black" /><circle cx="75" cy="65" r="10" fill="black" />
        <circle cx="25" cy="90" r="10" fill="black" /><circle cx="50" cy="90" r="10" fill="black" /><circle cx="75" cy="90" r="10" fill="black" />
        <circle cx="25" cy="114" r="10" fill="black" /><circle cx="50" cy="114" r="10" fill="black" /><circle cx="75" cy="114" r="10" fill="black" />
      </svg>
    </div>
  </div>

  <div class="screen-container">
    <div class="formula-display" id="formula"></div>
    <div class="display" id="display">0</div>
  </div>
  
  <div class="buttons">
 <!-- DEL 按鈕：加入 btn-larger -->
 <button class="btn-grey" onclick="handleBackspace()">
  <svg viewBox="0 0 24 24" style="width: 46px; height: 46px; fill: none; stroke: white; stroke-linecap: round; stroke-linejoin: round;">
    <!-- 這是一個連續的閉合路徑，保證不會有多餘線條，且每個邊粗細完全一致 -->
    <path d="M9 4 L2 12 L9 20 H20 A2 2 0 0 0 22 18 V6 A2 2 0 0 0 20 4 Z" stroke-width="2"/>
    
    <!-- 中間的 X -->
   <!-- 原本是 18,9 到 13,14，現在改為 19,8 到 12,15 -->
   <line x1="18" y1="8" x2="11" y2="15" stroke-width="2" stroke-linecap="round"/>
   <line x1="11" y1="8" x2="18" y2="15" stroke-width="2" stroke-linecap="round"/>
  </svg>
</button>
    <!-- AC 按鈕：加入 btn-larger -->
    <button class="btn-grey btn-larger" id="btn-clear" onclick="handleClear()">AC</button>
    
    <!-- % 按鈕：加入 btn-larger -->
    <!-- % 按鈕：使用 SVG 繪製，粗細與其他符號保持一致 -->
    <!-- % 按鈕：圓圈改為橢圓形線框，視覺上更像 0 -->
<button class="btn-grey" onclick="fakeOp()">
  <svg viewBox="0 0 24 24" style="width: 42px; height: 42px; fill: none; stroke: white; stroke-linecap: round; stroke-linejoin: round;">
    <!-- 上方 0：放大至 rx="2.5", ry="3.5" -->
    <ellipse cx="6.5" cy="6.5" rx="2.5" ry="3.5" stroke="white" stroke-width="2"/>
    
    <!-- 下方 0：放大至 r="3.5" -->
    <ellipse cx="17.5" cy="17.5" rx="2.5" ry="3.5" stroke="white" stroke-width="2"/>
    
   <!-- 中間斜線：拉長並調整座標，使其更傾斜 -->
    <!-- 起點與終點向邊緣延伸至 3 與 21，斜度更陡 -->
    <!-- <line x1="19.5" y1="4.5" x2="4.5" y2="19.5" stroke="white" stroke-width="2" stroke-linecap="round"/> -->
        <!-- X 軸從 18 縮到 6 (跨度僅 12)，Y 軸從 2.5 伸展到 21.5 (跨度達 19) -->
    <line x1="18" y1="2.5" x2="6" y2="21.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </svg>
</button>
    <!-- 除號 (÷) - 放大並加粗 -->
<!-- 除號 (÷) - 中間橫線加粗，上下兩點調瘦 -->
<!-- 除號 (÷) - 中間橫線加粗，上下兩點調瘦 -->
<button class="btn-orange" onclick="handleOperator('÷')">
  <svg viewBox="0 0 24 24">
    <!-- 中間橫線保持粗度 -->
    <line x1="4" y1="12" x2="20" y2="12" stroke-width="4" stroke-linecap="round"/>
    <!-- 上下的點調瘦：將半徑 r 從 2.5 縮小為 1.8 -->
    <circle cx="12" cy="4" r="0.2" fill="white"/>
    <circle cx="12" cy="20" r="0.2" fill="white"/>
  </svg>
</button>
    <button class="btn-dark-grey" onclick="appendNumber('7')">7</button><button class="btn-dark-grey" onclick="appendNumber('8')">8</button><button class="btn-dark-grey" onclick="appendNumber('9')">9</button><!-- 乘號 (×) - 放大並加粗 -->
<button class="btn-orange" onclick="handleOperator('×')">
  <svg viewBox="0 0 24 24">
    <line x1="6" y1="6" x2="18" y2="18"/>
    <line x1="18" y1="6" x2="6" y2="18"/>
  </svg>
</button>
    <button class="btn-dark-grey" onclick="appendNumber('4')">4</button><button class="btn-dark-grey" onclick="appendNumber('5')">5</button><button class="btn-dark-grey" onclick="appendNumber('6')">6</button><!-- 減號 -->
<!-- 減號 (拉長並加粗) -->
<button class="btn-orange" onclick="handleOperator('-')">
  <svg viewBox="0 0 24 24">
    <line x1="3" y1="12" x2="21" y2="12" />
  </svg>
</button>
    <button class="btn-dark-grey" onclick="appendNumber('1')">1</button><button class="btn-dark-grey" onclick="appendNumber('2')">2</button><button class="btn-dark-grey" onclick="appendNumber('3')">3<!-- 加號 (放大並加粗) -->
<button class="btn-orange" onclick="handleOperator('+')">
  <svg viewBox="0 0 24 24">
    <line x1="12" y1="4" x2="12" y2="20"/>
    <line x1="4" y1="12" x2="20" y2="12"/>
  </svg>
</button>
</button>
<!-- +/- 按鈕：細線條、大間距樣式 -->
<button class="btn-dark-grey" onclick="handleToggleSign()">
    <svg viewBox="0 0 24 24" style="width: 38px; height: 40px; fill: none; stroke: white; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;">
    <!-- 中間長斜線：座標從 (17,5) 延伸至 (19,3) 到 (5,21)，長度顯著增加 -->
    <line x1="18" y1="2" x2="6" y2="22" stroke-width="1.9" />
      
    <!-- 左上角的加號 (+)：線段長度從 4 增加到 6 -->
    <line x1="3.5" y1="7" x2="9.5" y2="7" /> <!-- 橫線：x 從 3.5 到 9.5 -->
    <line x1="6.5" y1="4" x2="6.5" y2="10" /> <!-- 直線：y 從 5 到 11 -->
    
    <!-- 右下角的減號 (-)：線段長度從 4 增加到 6 -->
    <line x1="15.5" y1="18" x2="21.5" y2="18" /> <!-- 橫線：x 從 14.5 到 20.5 -->
    </svg>
  </button>
  <button class="btn-dark-grey" onclick="appendNumber('0')">0</button><button class="btn-dark-grey" onclick="appendNumber('.')">.</button><!-- 等號 (=) - 使用兩條平行線，與其他運算符號粗細與寬度一致 -->
<button class="btn-orange" onclick="handleEqual()">
  <svg viewBox="0 0 24 24">
    <line x1="4" y1="7" x2="20" y2="7" stroke-width="4" stroke-linecap="round"/>
    <line x1="4" y1="17" x2="20" y2="17" stroke-width="4" stroke-linecap="round"/>
  </svg>
</button>
</div>

<script>
  let displayValue = "0", isResultState = false, waitingForFinalReveal = false, finalTarget = "";
  let forcedResult = null, peopleCount = 2, currentPlusCount = 0;
  let magicInputMode = false, magicDigitBuffer = ""; // 新增：魔術輸入緩衝
  
  const displayEl = document.getElementById('display'), formulaEl = document.getElementById('formula'), clearBtn = document.getElementById('btn-clear');

  function saveSettings() {
    forcedResult = document.getElementById('forced-input').value;
    peopleCount = parseInt(document.getElementById('people-count').value) || 2;
    handleClear();
    document.getElementById('settings-panel').style.display = 'none';
  }

  // 為了節省空間，其他函式如 updateDisplay, handleEqual 等請沿用你原本的
  function updateDisplay(overrideValue = null) {
    let raw = overrideValue !== null ? overrideValue : displayValue;
    
    // 1. 格式化數字
    let formatted = raw.replace(/\d+/g, n => parseInt(n).toLocaleString());
    if (raw.startsWith('-') && !isNaN(raw.slice(1))) {
      formatted = "(" + raw + ")";
    }
    
    displayEl.innerText = formatted;

    // 2. 動態字體縮小邏輯
    // 預設 70px，超過 7 個數字開始縮小，直到 12 個數字
    let length = formatted.length;
    if (length > 10) {
      // 計算縮放比例：若 length=12，fontSize 大約為 40px
      let newSize = Math.max(64, 70 - (length - 7) * 6);
      displayEl.style.fontSize = newSize + "px";
    } else {
      displayEl.style.fontSize = "70px";
    }
      // 當字數超過 12 時，雖然不再縮小，但啟用滾動，並自動滾到最右邊顯示最新輸入
      displayEl.scrollLeft = displayEl.scrollWidth;
  }

  function appendNumber(num) {

      // 修正：計算結果出爐後，按數字鍵應「延續」結果而非清空 (配合 Backspace 的解鎖概念)
    if (waitingForFinalReveal) return;
    if (isResultState) {
        isResultState = false;
        formulaEl.innerText = "";
        formulaEl.classList.remove('visible');
    }
  
    
    if (isResultState) handleClear();

    // 魔術邏輯：如果進入了補位輸入模式
    if (magicInputMode) {
      magicDigitBuffer += num;
      displayValue += num;
      updateDisplay();

      // 當輸入到第 3 個數字時，執行轉換
      if (magicDigitBuffer.length === 4) {
        executeMagicConversion();
      }
      return;
    }

    displayValue = (displayValue === "0") ? num : displayValue + num;
    clearBtn.innerText = "C";
    updateDisplay();
  }

  function handleOperator(op) {
    if (waitingForFinalReveal || magicInputMode) return;
    if (isResultState) isResultState = false;

    if (op === '+') {
      currentPlusCount++;
      // 當點擊到設定的人數（第 N 個加號）
      if (currentPlusCount === peopleCount) {
        displayValue += "+";
        magicInputMode = true; // 進入 3 位數預輸入模式
        magicDigitBuffer = "";
        updateDisplay();
        return;
      }
    }

    if (['+','-','×','÷'].includes(displayValue.slice(-1))) {
      displayValue = displayValue.slice(0, -1) + op;
    } else {
      displayValue += op;
    }
    updateDisplay();
  }

  function executeMagicConversion() {
    let target;
    if (forcedResult && forcedResult.trim() !== "") {
      target = parseInt(forcedResult);
    } else {
      const now = new Date();
      target = parseInt(`${now.getMonth() + 1}${now.getDate().toString().padStart(2, '0')}${now.getHours().toString().padStart(2, '0')}${now.getMinutes().toString().padStart(2, '0')}`);
    }
    
    finalTarget = target.toString();
    // 移除剛輸入的 3 個數字，計算真正的差距
    let baseFormula = displayValue.slice(0, -4).replace(/×/g, '*').replace(/÷/g, '/');
    let currentSum = eval(baseFormula + "0"); // +0 避免結尾是加號出錯
    let gap = target - currentSum;
    
    // 修正 displayValue：將最後 3 位替換成真正的湊數
    displayValue = displayValue.slice(0, -4) + gap;
    
    magicInputMode = false;
    waitingForFinalReveal = true;
    updateDisplay();
  }

  function handleEqual() {
    if (waitingForFinalReveal) {
      formulaEl.innerText = displayEl.innerText;
      formulaEl.classList.add('visible');
      displayValue = finalTarget;
      waitingForFinalReveal = false;
      isResultState = true;
    } else {
      try {
        let formula = displayValue.replace(/×/g, '*').replace(/÷/g, '/');
        displayValue = eval(formula).toString();
        isResultState = true;
      } catch(e) { displayValue = "Error"; }
    }
    updateDisplay();
  }

  function handleClear() {
    displayValue = "0"; isResultState = false; waitingForFinalReveal = false; 
    currentPlusCount = 0; magicInputMode = false; magicDigitBuffer = "";
    formulaEl.innerText = ""; formulaEl.classList.remove('visible'); clearBtn.innerText = "AC"; 
    updateDisplay();
  }

  function handleBackspace() {
    // 狀態 1：如果是結果顯示後
    if (isResultState) {
      isResultState = false;
      formulaEl.innerText = "";
      formulaEl.classList.remove('visible');
      // 這裡不 return，讓它繼續執行後面的刪除
    }

    // 狀態 2：如果是魔術觸發後（鎖定中）
    if (waitingForFinalReveal) {
      // 撤銷湊數，回到魔術輸入模式
      displayValue = displayValue.slice(0, -lastMagicGapLength);
      magicInputMode = true;
      magicDigitBuffer = ""; // 清空緩衝，讓使用者重打 3 位
      waitingForFinalReveal = false;
      updateDisplay();
      return;
    }

    // 狀態 3：魔術輸入中
    if (magicInputMode) {
      if (magicDigitBuffer.length > 0) {
        magicDigitBuffer = magicDigitBuffer.slice(0, -1);
        displayValue = displayValue.slice(0, -1);
      } else {
        magicInputMode = false;
        currentPlusCount--;
        displayValue = displayValue.slice(0, -1);
      }
    } 
    // 狀態 4：一般輸入
    else {
      if (displayValue.length > 1) {
        displayValue = displayValue.slice(0, -1);
      } else {
        displayValue = "0"; clearBtn.innerText = "AC";
        handleClear()
      }
    }
    updateDisplay();
  }

  function handleToggleSign() {
    if (magicInputMode) return;
    if (displayValue !== "0") displayValue = displayValue.startsWith('-') ? displayValue.slice(1) : '-' + displayValue;
    updateDisplay();
  }
  function fakeOp() {}
</script>
</body>
</html>
