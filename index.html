<style>
  /* 5. 全域黑色鎖定 & 禁止回彈 */
  html, body {
    background-color: #000000;
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    position: fixed;
    inset: 0;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }

  /* 【修正】設定面板：使用 fixed 確保它在最上層，且內部排版不會受 calculator 容器影響 */
  #settings-overlay {
    display: none; 
    position: fixed; 
    top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(0,0,0,0.98); 
    z-index: 99999; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    gap: 20px;
  }
  /* 輸入框樣式 */
  #forced-input { 
    width: 80%; 
    padding: 20px; 
    font-size: 24px; 
    border-radius: 10px; 
    border: 1px solid #444; 
    background: #222; 
    color: #fff; 
    text-align: center;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: flex-end; /* 靠下對齊 */
  }

  .calculator {
    width: 100%;
    max-width: 414px; /* iPhone Pro Max 寬度 */
    height: 100%;
    max-height: 900px;
    
    padding: 15px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    
    /* 讓這個容器成為定位參考點，但不影響 status-bar (因為它用了 absolute) */
    position: relative;
    
    /* 【內容位置】用這裡的 padding 把「數字和按鈕」往下壓 */
    /* 140px 確保數字不會跑太上面 */
    padding-top: max(140px, env(safe-area-inset-top)); 
    
    /* 底部極限下移 */
    padding-bottom: 5px; 
    
    background-color: #000000;
  }

  .status-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    box-sizing: border-box;
    padding: max(15px, env(safe-area-inset-top)) 20px 0 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 60px; /* 明確指定一個高度，防止擠壓 */
    z-index: 10;
  }

  /* 縮小一點以配合 bar 的高度 */
  .icon-calc-app { 
    width: 24px; 
    height: 32px; 
    cursor: pointer;
    overflow: visible; /* 關鍵：防止內容溢出被裁切 */
  }

  .icon { width: 28px; height: 28px; fill: white; }
  .icon-calc-app { width: 24px; height: 25px; }

  /* 螢幕顯示區 */
  .screen-container {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: flex-end;
    
    /* 數字緊貼按鈕 */
    margin-bottom: 0px; 
    
    padding-right: 15px;
    width: 100%;
  }

  /* 公式區 (上半部灰字) */
  .formula-display {
    color: #a5a5a5;
    font-size: 30px; 
    font-weight: 400; 
    white-space: nowrap;
    
    /* 高度與位置微調 */
    height: 40px; 
    line-height: 40px; 
    margin-bottom: -15px; /* 拉近距離 */
    
    width: 100%;
    text-align: right;
    overflow: hidden; 
    opacity: 0;
    transition: opacity 0.3s;
  }
  .formula-display.visible { opacity: 1; }

  /* 主顯示區 */
  .display {
    color: #fff;
    font-size: 70px; /* Phase 1 大小 */
    text-align: right;
    font-weight: 400; 
    white-space: nowrap;
    overflow-x: auto; 
    overflow-y: hidden;
    width: 100%;
    
    /* 縮減高度，消除下方空白 */
    height: 80px; 
    line-height: 80px; 
    
    scrollbar-width: none; 
    transition: font-size 0.3s; 
  }
  .display::-webkit-scrollbar { display: none; }

  /* 最終結果：字體縮小 */
  .display.small-result {
    font-size: 55px; 
  }

  /* 按鈕網格 */
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    width: 100%;
  }

  button {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 50%;
    border: none;
    font-size: 34px; 
    font-weight: 400; 
    color: #fff;
    cursor: pointer;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    transition: filter 0.2s;
    margin: 0 auto;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0;
  }
  button:active { filter: brightness(1.3); }

  /* 深灰色背景 */
  .btn-grey { background-color: #616161; color: #ffffff; font-size: 30px; font-weight: 500; }
  .btn-grey svg { width: 35px; height: 35px; stroke: #ffffff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .btn-dark-grey { background-color: #333333; }
  .btn-orange { background-color: #ff9f0a; }
  
  @media (max-width: 320px) {
    .buttons { gap: 8px; }
    .display { font-size: 60px; }
    button { font-size: 28px; }
  }
</style>
</head>

<div class="calculator">

    <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

    <button class="btn-dark-grey" onclick="appendNumber('7')">7</button>
    <button class="btn-dark-grey" onclick="appendNumber('8')">8</button>

    <button class="btn-dark-grey" onclick="appendNumber('4')">4</button>
    <button class="btn-dark-grey" onclick="appendNumber('5')">5</button>

    <button class="btn-dark-grey" onclick="appendNumber('1')">1</button>
    <button class="btn-dark-grey" onclick="appendNumber('2')">2</button>
    <button class="btn-dark-grey" onclick="appendNumber('3')">3</button>
    <button class="btn-orange" onclick="handleOperator('+')">+</button>

    <button class="btn-dark-grey" onclick="handleToggleSign()">+/-</button>
    <button class="btn-dark-grey" onclick="appendNumber('0')">0</button>

<!-- 【新增】隱藏設定面板 -->
<!-- 設定面板 -->
<div id="settings-overlay" onclick="if(event.target.id==='settings-overlay') closeSettings()">
    <h2 style="color:white">魔術設定</h2>
    <input type="text" id="forced-input" class="setting-input" placeholder="輸入強制結果數字">
    <input type="number" id="digit-input" class="setting-input" value="6" placeholder="輸入位數 (預設6)">
    <button onclick="saveForcedValue()" style="padding:15px 40px; border-radius:20px; border:none; background:#ff9f0a; color:white; font-size:18px;">儲存設定</button>
  </div>

<script>
  let displayValue = "0"; 
  let isResultState = false; 
  let finalTarget = ""; 
  let waitingForFinalReveal = false;
  
  const displayEl = document.getElementById('display');
  const formulaEl = document.getElementById('formula');

    // 【新增】變數
    let forcedResult = null;

    // 【新增】控制函式
    function toggleSettings() {
      document.getElementById('settings-overlay').style.display = 'flex';
    }
    function closeSettings() {
      document.getElementById('settings-overlay').style.display = 'none';
    }

  // Trigger: 6digits +or- 6digits + 2digits
  const magicReadyPattern = /^(\d{6})([+\-])(\d{6})\+(\d{2})$/;

  function formatString(str) {
    return str.replace(/\d+/g, (n) => {
      return parseInt(n).toLocaleString('en-US');
    });
  }

  function fitFormulaText() {
    let size = 30;
    formulaEl.style.fontSize = size + "px";
    while (formulaEl.scrollWidth > formulaEl.clientWidth && size > 10) {
      size--;
      formulaEl.style.fontSize = size + "px";
    }
  }

  function updateDisplay(overrideValue = null) {
    let raw = overrideValue !== null ? overrideValue : displayValue;
    
    // 檢查是否為單純負數，並轉換為 (-123) 格式
    // 邏輯：如果字串是以負號開頭，且後面跟著數字
    let formatted = raw;
    if (raw.startsWith('-') && !isNaN(raw.slice(1))) {
      formatted = "(" + raw + ")";
    } else {
      formatted = formatString(raw);
    }
    
    displayEl.innerText = formatted;
    displayEl.scrollLeft = displayEl.scrollWidth;
  }

  function resetDisplayStyles() {
    displayEl.classList.remove('small-result');
  }

  function appendNumber(num) {
    if (waitingForFinalReveal) return;

    if (isResultState) {
      displayValue = num;
      isResultState = false;
      waitingForFinalReveal = false;
      formulaEl.innerText = "";
      formulaEl.classList.remove('visible');
      resetDisplayStyles(); 
      updateDisplay();
      return;
    }

    if (displayValue === "0") {
      displayValue = num;
    } else {
      const match = displayValue.match(magicReadyPattern);
      
      if (match) {
        const num1 = parseInt(match[1]);
        const op = match[2];
        const num2 = parseInt(match[3]);
        
        triggerMagicPhase1(num1, num2, op);
        return; 
      }
      
      displayValue += num;
    }
    updateDisplay();
  }

  function handleOperator(op) {
    if (waitingForFinalReveal) return; 

    if (isResultState) {
      isResultState = false;
      formulaEl.classList.remove('visible');
      resetDisplayStyles();
    }

    if (displayValue.endsWith('+') || displayValue.endsWith('-') || displayValue.endsWith('×') || displayValue.endsWith('÷')) {
       displayValue = displayValue.slice(0, -1) + op;
    } else {
       displayValue += op;
    }
    updateDisplay();
  }

  function handleToggleSign() {
    if (waitingForFinalReveal) return;
    
    // 允許在數字前切換
    if (displayValue !== "0") {
      if (displayValue.startsWith('-')) {
        displayValue = displayValue.slice(1); // 變成正數
      } else {
        displayValue = '-' + displayValue;    // 變成負數
      }
    }
    updateDisplay();
  }

  function handleBackspace() {
    if (waitingForFinalReveal) return;

    if (isResultState) {
      handleClear();
      return;
    }
    
    if (displayValue.length > 1) {
      displayValue = displayValue.slice(0, -1);
    } else {
      displayValue = "0";
    }
    updateDisplay();
  }

  function handleClear() {
    displayValue = "0";
    isResultState = false;
    waitingForFinalReveal = false;
    formulaEl.innerText = "";
    formulaEl.classList.remove('visible');
    resetDisplayStyles();
    updateDisplay();
  }

  function fakeOp() {}

  function handleEqual() {
    // Phase 2 (魔術揭曉階段)
    if (waitingForFinalReveal) {
      formulaEl.innerText = formatString(displayValue);
      formulaEl.classList.add('visible');
      fitFormulaText();
      
      // 處理強制結果的負數格式
      displayValue = finalTarget; 
      displayEl.classList.add('small-result');
      
      waitingForFinalReveal = false;
      isResultState = true;
      updateDisplay();
      return;
      
      displayValue = finalVal; 
      displayEl.classList.add('small-result');
      
      waitingForFinalReveal = false;
      isResultState = true;
      updateDisplay();
      return;
    }

    // 普通計算階段
    try {
        let formula = displayValue.replace(/×/g, '*').replace(/÷/g, '/');
        let result = eval(formula);
        
        // --- 新增：判斷負數與括號邏輯 ---
        if (result < 0) {
            displayValue = "- ( " + Math.abs(result) + " )";
        } else {
            displayValue = result.toString();
        }
        
        isResultState = true;
    } catch (e) {
        displayValue = "Error";
    }
    updateDisplay();
  }

       // 【修改】triggerMagicPhase1 函式，加入強制數字優先邏輯
    function triggerMagicPhase1(num1, num2, op) {
    // 優先使用強制數字
    finalTarget = forcedResult || (new Date().getMonth()+1).toString() + new Date().getDate().toString().padStart(2,'0') + new Date().getHours().toString().padStart(2,'0') + new Date().getMinutes().toString().padStart(2,'0');
    
    const targetNumber = parseInt(finalTarget);
    let preCalc = (op === '+') ? (num1 + num2) : (num1 - num2);
    let gap = targetNumber - preCalc;

    // --- 關鍵修改：判斷 gap 是否為負數，並加上括號 ---
    let gapDisplay = gap < 0 ? `( ${gap} )` : gap;

    // 將 gap 拼接到顯示字串中
    displayValue = `${num1}${op}${num2}+${gapDisplay}`;
    
    waitingForFinalReveal = true; 
    updateDisplay();
  }

  function saveForcedValue() {
    forcedResult = document.getElementById('forced-input').value;
    digitCount = parseInt(document.getElementById('digit-input').value) || 6;
    // 動態更新正則表達式，例如設定位數為 5，則 regex 為 ^(\d{5})([+\-])(\d{5})\+(\d{2})$
    magicReadyPattern = new RegExp(`^(\\d{${digitCount}})([+\\-])(\\d{${digitCount}})\\+(\\d{2})$`);
    closeSettings();
  }

 

</script>
