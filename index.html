<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Magic Calculator</title>
<style>
  /* [保持你原本的 CSS 完全不動] */
  html, body { background-color: #000000; width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; position: fixed; inset: 0; overscroll-behavior: none; -webkit-font-smoothing: antialiased; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-user-select: none; user-select: none; touch-action: manipulation; }
  body { display: flex; justify-content: center; align-items: flex-end; }
  .calculator { width: 100%; max-width: 414px; height: 100%; max-height: 900px; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end; position: relative; padding-top: max(140px, env(safe-area-inset-top)); padding-bottom: 5px; background-color: #000000; }
  .status-bar { position: absolute; top: 0; left: 0; width: 100%; box-sizing: border-box; padding-left: 20px; padding-right: 20px; display: flex; justify-content: space-between; align-items: center; padding-top: max(15px, env(safe-area-inset-top)); color: white; z-index: 10; }
  .icon { width: 28px; height: 28px; fill: white; }
  .icon-calc-app { width: 32px; height: 32px; cursor: pointer; }
  .screen-container { display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end; margin-bottom: 0px; padding-right: 15px; width: 100%; }
  .formula-display { color: #a5a5a5; font-size: 30px; font-weight: 400; white-space: nowrap; height: 40px; line-height: 40px; margin-bottom: -15px; width: 100%; text-align: right; overflow: hidden; opacity: 0; transition: opacity 0.3s; }
  .formula-display.visible { opacity: 1; }
  .display {
      color: #fff;
      font-size: 70px; /* 預設大小 */
      text-align: right;
      width: 100%;
      height: 80px;
      line-height: 80px;
      white-space: nowrap;
      /* 這裡不需要 overflow-x: auto 了，我們改用 JS 縮放 */
      transition: font-size 0.2s ease-out; 
      /* 確保數字靠右 */
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }
  .display::-webkit-scrollbar { display: none; }  .display::-webkit-scrollbar { display: none; }
  .display.small-result { font-size: 55px; }
  .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
  button { width: 100%; aspect-ratio: 1; border-radius: 50%; border: none; font-size: 34px; font-weight: 400; color: #fff; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; transition: filter 0.2s; margin: 0 auto; display: flex; justify-content: center; align-items: center; padding: 0; }
  button:active { filter: brightness(1.3); }
  .btn-grey { background-color: #616161; color: #ffffff; font-size: 30px; font-weight: 500; }
  .btn-grey svg { width: 35px; height: 35px; stroke: #ffffff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .btn-dark-grey { background-color: #333333; }
  .btn-orange { background-color: #ff9f0a; }

  /* 隱藏設定面板樣式 (不干擾 UI) */
  #settings-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
  input { width: 60%; padding: 15px; font-size: 20px; color: #fff; background: #333; border: none; border-radius: 10px; text-align: center; }
</style>
</head>
<body>

<!-- 設定面板 -->
<div id="settings-panel">
  <input type="text" id="forced-input" placeholder="強制數字 (留空則用時間)">
  <input type="number" id="digit-input" value="6" placeholder="輸入位數">
  <button onclick="saveSettings()" style="padding:15px 30px; background:#ff9f0a; color:white; border:none; border-radius:20px;">儲存設定</button>
</div>

<div class="calculator">
  <div class="status-bar">
    <svg class="icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
    <svg class="icon-calc-app" onclick="document.getElementById('settings-panel').style.display='flex'" viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="100" height="130" rx="15" ry="15" fill="white" />
      <rect x="15" y="15" width="70" height="35" rx="8" ry="8" fill="black" />
      <circle cx="25" cy="70" r="10" fill="black" /><circle cx="50" cy="70" r="10" fill="black" /><circle cx="75" cy="70" r="10" fill="black" />
      <circle cx="25" cy="95" r="10" fill="black" /><circle cx="50" cy="95" r="10" fill="black" /><circle cx="75" cy="95" r="10" fill="black" />
      <circle cx="25" cy="120" r="10" fill="black" /><circle cx="50" cy="120" r="10" fill="black" /><circle cx="75" cy="120" r="10" fill="black" />
    </svg>
  </div>

  <div class="screen-container">
    <div class="formula-display" id="formula"></div>
    <div class="display" id="display">0</div>
  </div>
  
  <div class="buttons">
    <button class="btn-grey" onclick="handleBackspace()"><svg viewBox="0 0 24 24"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg></button>
    <button class="btn-grey" onclick="handleClear()">AC</button>
    <button class="btn-grey" onclick="fakeOp()">%</button>
    <button class="btn-orange" onclick="handleOperator('÷')">÷</button>
    <button class="btn-dark-grey" onclick="appendNumber('7')">7</button><button class="btn-dark-grey" onclick="appendNumber('8')">8</button><button class="btn-dark-grey" onclick="appendNumber('9')">9</button><button class="btn-orange" onclick="handleOperator('×')">×</button>
    <button class="btn-dark-grey" onclick="appendNumber('4')">4</button><button class="btn-dark-grey" onclick="appendNumber('5')">5</button><button class="btn-dark-grey" onclick="appendNumber('6')">6</button><button class="btn-orange" onclick="handleOperator('-')">-</button>
    <button class="btn-dark-grey" onclick="appendNumber('1')">1</button><button class="btn-dark-grey" onclick="appendNumber('2')">2</button><button class="btn-dark-grey" onclick="appendNumber('3')">3</button><button class="btn-orange" onclick="handleOperator('+')">+</button>
    <button class="btn-dark-grey" onclick="handleToggleSign()">+/-</button><button class="btn-dark-grey" onclick="appendNumber('0')">0</button><button class="btn-dark-grey" onclick="appendNumber('.')">.</button><button class="btn-orange" onclick="handleEqual()">=</button>
  </div>
</div>

<script>
  let displayValue = "0", isResultState = false, finalTarget = "", waitingForFinalReveal = false;
  let forcedResult = null, digitCount = 6;

  function saveSettings() {
    forcedResult = document.getElementById('forced-input').value || null;
    digitCount = parseInt(document.getElementById('digit-input').value) || 6;
    document.getElementById('settings-panel').style.display = 'none';
  }

  function appendNumber(num) {
    if (waitingForFinalReveal) return;
    if (isResultState) { displayValue = num; isResultState = false; formulaEl.innerText = ""; formulaEl.classList.remove('visible'); resetDisplayStyles(); }
    else if (displayValue === "0") displayValue = num;
    else {
      // 根據動態設定的位數進行偵測
      let reg = new RegExp(`^(\\d{${digitCount}})([+\\-])(\\d{${digitCount}})\\+(\\d{2})$`);
      const match = displayValue.match(reg);
      if (match) { triggerMagicPhase1(parseInt(match[1]), parseInt(match[3]), match[2]); return; }
      displayValue += num;
    }
    updateDisplay();
  }

  // 其他邏輯保持原狀...
  function triggerMagicPhase1(num1, num2, op) {
    finalTarget = forcedResult || (new Date().getMonth()+1).toString() + new Date().getDate().toString().padStart(2,'0') + new Date().getHours().toString().padStart(2,'0') + new Date().getMinutes().toString().padStart(2,'0');
    let preCalc = (op === '+') ? (num1 + num2) : (num1 - num2);
    let gap = parseInt(finalTarget) - preCalc;
    displayValue = `${num1}${op}${num2}+${gap < 0 ? `(${gap})` : gap}`;
    waitingForFinalReveal = true; updateDisplay();
  }

  // 為了節省空間，其他函式如 updateDisplay, handleEqual 等請沿用你原本的
  function updateDisplay(overrideValue = null) {
    let raw = overrideValue !== null ? overrideValue : displayValue;
    
    // 1. 格式化數字
    let formatted = raw.replace(/\d+/g, n => parseInt(n).toLocaleString());
    if (raw.startsWith('-') && !isNaN(raw.slice(1))) {
      formatted = "(" + raw + ")";
    }
    
    displayEl.innerText = formatted;

    // 2. 動態字體縮小邏輯
    // 預設 70px，超過 7 個數字開始縮小，直到 12 個數字
    let length = formatted.length;
    if (length > 7) {
      // 計算縮放比例：若 length=12，fontSize 大約為 40px
      let newSize = Math.max(40, 70 - (length - 7) * 6);
      displayEl.style.fontSize = newSize + "px";
    } else {
      displayEl.style.fontSize = "70px";
    }
  }
  function handleClear() { displayValue = "0"; isResultState = false; waitingForFinalReveal = false; formulaEl.innerText = ""; updateDisplay(); }
  function handleBackspace() { displayValue = displayValue.length > 1 ? displayValue.slice(0, -1) : "0"; updateDisplay(); }
  function handleOperator(op) { displayValue += op; updateDisplay(); }
  function handleToggleSign() { displayValue = (parseFloat(displayValue)*-1).toString(); updateDisplay(); }
  function handleEqual() { 
      if(waitingForFinalReveal) { formulaEl.innerText = displayValue; formulaEl.classList.add('visible'); displayValue = finalTarget; waitingForFinalReveal = false; isResultState = true; updateDisplay(); }
      else try { displayValue = eval(displayValue.replace(/×/g,'*').replace(/÷/g,'/')).toString(); isResultState = true; updateDisplay(); } catch(e) { displayValue = "Error"; updateDisplay(); }
  }
  function fakeOp() {}
  const displayEl = document.getElementById('display'), formulaEl = document.getElementById('formula'), resetDisplayStyles = () => displayEl.classList.remove('small-result');
</script>
</body>
</html>
