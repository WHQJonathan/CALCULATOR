<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Magic Calculator</title>

<style>
  html, body { background-color: #000000; width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; position: fixed; inset: 0; overscroll-behavior: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-user-select: none; user-select: none; touch-action: manipulation; }
  .calculator { width: 100%; max-width: 414px; height: 100%; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end; position: relative; padding-top: max(140px, env(safe-area-inset-top)); padding-bottom: 5px; margin: 0 auto; background-color: #000000; }
  
  /* 設定面板樣式 */
  #settings-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
  .input-group { width: 80%; display: flex; flex-direction: column; gap: 10px; }
  .input-group label { color: white; font-size: 18px; }
  #forced-input, #digit-input { width: 100%; padding: 15px; font-size: 20px; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; box-sizing: border-box; }
  .action-btn { padding: 15px 30px; font-size: 20px; border-radius: 20px; border: none; background: #ff9f0a; color: white; cursor: pointer; }

  /* 頂部狀態列 */
  .status-bar { position: absolute; top: 0; left: 0; width: 100%; box-sizing: border-box; padding: max(15px, env(safe-area-inset-top)) 20px 0 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; z-index: 10; }
  .icon-calc-app { width: 35px; height: 35px; cursor: pointer; }

  .screen-container { display: flex; flex-direction: column; align-items: flex-end; padding-right: 15px; width: 100%; }
  .formula-display { color: #a5a5a5; font-size: 30px; height: 40px; margin-bottom: -15px; width: 100%; text-align: right; opacity: 0; }
  .formula-display.visible { opacity: 1; }
  .display { color: #fff; font-size: 70px; text-align: right; width: 100%; height: 80px; overflow-x: auto; scrollbar-width: none; transition: font-size 0.3s; }
  .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
  button { width: 100%; aspect-ratio: 1; border-radius: 50%; border: none; font-size: 34px; color: #fff; cursor: pointer; display: flex; justify-content: center; align-items: center; padding: 0; background-color: #333; }
  .btn-grey { background-color: #616161; }
  .btn-orange { background-color: #ff9f0a; }
</style>
</head>
<body>

<!-- 設定面板 -->
<div id="settings-overlay">
  <div class="input-group">
    <label>強制結果數字：</label>
    <input type="text" id="forced-input" placeholder="留空則使用時間">
  </div>
  <div class="input-group">
    <label>觀眾輸入位數 (預設6)：</label>
    <input type="number" id="digit-input" value="6">
  </div>
  <button class="action-btn" onclick="saveSettings()">儲存並離開</button>
  <button onclick="closeSettings()" style="background:none; border:none; color:white; text-decoration:underline;">取消</button>
</div>

<div class="calculator">
  <div class="status-bar">
    <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
    <svg class="icon-calc-app" onclick="toggleSettings()" viewBox="0 0 100 135" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="100" height="135" rx="15" ry="15" fill="white" />
      <rect x="15" y="15" width="70" height="35" rx="8" ry="8" fill="black" />
      <circle cx="25" cy="70" r="10" fill="black" /><circle cx="50" cy="70" r="10" fill="black" /><circle cx="75" cy="70" r="10" fill="black" />
      <circle cx="25" cy="100" r="10" fill="black" /><circle cx="50" cy="100" r="10" fill="black" /><circle cx="75" cy="100" r="10" fill="black" />
      <circle cx="25" cy="130" r="10" fill="black" /><circle cx="50" cy="130" r="10" fill="black" /><circle cx="75" cy="130" r="10" fill="black" />
    </svg>
  </div>
  <div class="screen-container">
    <div class="formula-display" id="formula"></div>
    <div class="display" id="display">0</div>
  </div>
  <div class="buttons">
    <button class="btn-grey" onclick="handleBackspace()">DEL</button>
    <button class="btn-grey" onclick="handleClear()">AC</button>
    <button class="btn-grey" onclick="fakeOp()">%</button>
    <button class="btn-orange" onclick="handleOperator('÷')">÷</button>
    <button onclick="appendNumber('7')">7</button><button onclick="appendNumber('8')">8</button><button onclick="appendNumber('9')">9</button><button class="btn-orange" onclick="handleOperator('×')">×</button>
    <button onclick="appendNumber('4')">4</button><button onclick="appendNumber('5')">5</button><button onclick="appendNumber('6')">6</button><button class="btn-orange" onclick="handleOperator('-')">-</button>
    <button onclick="appendNumber('1')">1</button><button onclick="appendNumber('2')">2</button><button onclick="appendNumber('3')">3</button><button class="btn-orange" onclick="handleOperator('+')">+</button>
    <button onclick="handleToggleSign()">+/-</button><button onclick="appendNumber('0')">0</button><button onclick="appendNumber('.')">.</button><button class="btn-orange" onclick="handleEqual()">=</button>
  </div>
</div>

<script>
  let displayValue = "0", forcedResult = null, digitCount = 6, waitingForFinalReveal = false;
  
  function toggleSettings() { document.getElementById('settings-overlay').style.display = 'flex'; }
  function closeSettings() { document.getElementById('settings-overlay').style.display = 'none'; }
  function saveSettings() {
    forcedResult = document.getElementById('forced-input').value;
    digitCount = parseInt(document.getElementById('digit-input').value) || 6;
    closeSettings();
  }

  function appendNumber(num) {
    if (waitingForFinalReveal) return;
    displayValue = (displayValue === "0") ? num : displayValue + num;
    
    // 動態偵測位數：regex 根據 digitCount 產生
    let reg = new RegExp(`^(\\d{${digitCount}})([+\\-])(\\d{${digitCount}})\\+(\\d{2})$`);
    const match = displayValue.match(reg);
    if (match) triggerMagic(parseInt(match[1]), parseInt(match[3]), match[2]);
    updateDisplay();
  }

  function triggerMagic(n1, n2, op) {
    let target = forcedResult || (new Date().getMonth()+1).toString() + new Date().getDate().toString().padStart(2,'0') + new Date().getHours().toString().padStart(2,'0') + new Date().getMinutes().toString().padStart(2,'0');
    let pre = (op === '+') ? (n1 + n2) : (n1 - n2);
    let gap = parseInt(target) - pre;
    let gapDisplay = gap < 0 ? `( ${gap} )` : gap;
    displayValue = `${n1}${op}${n2}+${gapDisplay}`;
    waitingForFinalReveal = true;
    updateDisplay();
  }

  function updateDisplay() { 
    displayEl.innerText = displayValue.replace(/\d+/g, n => parseInt(n).toLocaleString()); 
  }
  
  function handleEqual() { 
    if(forcedResult !== null) { displayValue = forcedResult; forcedResult = null; }
    else try { displayValue = eval(displayValue.replace(/×/g,'*').replace(/÷/g,'/')).toString(); } catch(e) { displayValue = "Error"; }
    updateDisplay();
  }
  
  function handleClear() { displayValue = "0"; waitingForFinalReveal = false; document.getElementById('formula').innerText = ""; updateDisplay(); }
  function handleBackspace() { displayValue = displayValue.length > 1 ? displayValue.slice(0, -1) : "0"; updateDisplay(); }
  function handleOperator(op) { displayValue += op; updateDisplay(); }
  function handleToggleSign() { displayValue = (parseFloat(displayValue)*-1).toString(); updateDisplay(); }
  function fakeOp() {}
  const displayEl = document.getElementById('display');
</script>
</body>
</html>
