<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Calculator">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Magic Calculator</title>

<style>
  html, body {
    background-color: #000000;
    width: 100%; height: 100%; margin: 0; padding: 0;
    overflow: hidden; position: fixed; inset: 0;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-user-select: none; user-select: none;
    touch-action: manipulation;
  }

  body { display: flex; justify-content: center; align-items: flex-end; }

  .calculator {
    width: 100%; max-width: 414px; height: 100%; max-height: 900px;
    padding: 15px; box-sizing: border-box;
    display: flex; flex-direction: column; justify-content: flex-end;
    position: relative;
    padding-top: max(140px, env(safe-area-inset-top)); 
    background-color: #000000;
  }

  /* 隱藏設定面板 */
  .settings-panel {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.95); z-index: 100;
    display: none; flex-direction: column; justify-content: center;
    align-items: center; gap: 20px; color: white;
  }
  .settings-panel input { padding: 15px; font-size: 20px; border-radius: 10px; width: 70%; border: none; }
  .settings-panel button { padding: 10px 25px; font-size: 18px; border-radius: 10px; border: none; cursor: pointer; }

  /* 觸發區域 */
  .settings-trigger { position: absolute; top: 20px; left: 20px; width: 40px; height: 40px; z-index: 99; }

  .status-bar {
    position: absolute; top: 0; left: 0; width: 100%; box-sizing: border-box;
    padding: max(15px, env(safe-area-inset-top)) 20px 0 20px;
    display: flex; justify-content: space-between; align-items: center;
    color: white; z-index: 10;
  }

  .icon { width: 28px; height: 28px; fill: white; }
  .screen-container { display: flex; flex-direction: column; align-items: flex-end; padding-right: 15px; width: 100%; }
  .formula-display { color: #a5a5a5; font-size: 30px; height: 40px; opacity: 0; transition: opacity 0.3s; }
  .formula-display.visible { opacity: 1; }
  .display { color: #fff; font-size: 70px; text-align: right; width: 100%; height: 80px; overflow-x: auto; }
  .display.small-result { font-size: 55px; }

  .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
  button { width: 100%; aspect-ratio: 1; border-radius: 50%; border: none; font-size: 34px; color: #fff; cursor: pointer; }
  .btn-grey { background-color: #616161; }
  .btn-dark-grey { background-color: #333333; }
  .btn-orange { background-color: #ff9f0a; font-size: 48px; }
</style>
</head>
<body>

<div class="calculator">
  <!-- 隱藏設定面板 -->
  <div id="settings-panel" class="settings-panel">
    <h2 style="margin-top:0">Magic Settings</h2>
    <input type="text" id="custom-result" placeholder="留空則使用時間模式">
    <button onclick="saveSettings()" style="background:#ff9f0a; color:white;">儲存並關閉</button>
  </div>

  <!-- 隱藏觸發點 -->
  <div class="settings-trigger" onclick="toggleSettings()"></div>

  <div class="status-bar">
    <svg class="icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
  </div>

  <div class="screen-container">
    <div class="formula-display" id="formula"></div>
    <div class="display" id="display">0</div>
  </div>
  
  <div class="buttons">
    <button class="btn-grey" onclick="handleBackspace()">DEL</button>
    <button class="btn-grey" id="btn-clear" onclick="handleClear()">AC</button>
    <button class="btn-grey" onclick="fakeOp()">%</button>
    <button class="btn-orange" onclick="handleOperator('÷')">÷</button>
    <button class="btn-dark-grey" onclick="appendNumber('7')">7</button>
    <button class="btn-dark-grey" onclick="appendNumber('8')">8</button>
    <button class="btn-dark-grey" onclick="appendNumber('9')">9</button>
    <button class="btn-orange" onclick="handleOperator('×')">×</button>
    <button class="btn-dark-grey" onclick="appendNumber('4')">4</button>
    <button class="btn-dark-grey" onclick="appendNumber('5')">5</button>
    <button class="btn-dark-grey" onclick="appendNumber('6')">6</button>
    <button class="btn-orange" onclick="handleOperator('-')">-</button>
    <button class="btn-dark-grey" onclick="appendNumber('1')">1</button>
    <button class="btn-dark-grey" onclick="appendNumber('2')">2</button>
    <button class="btn-dark-grey" onclick="appendNumber('3')">3</button>
    <button class="btn-orange" onclick="handleOperator('+')">+</button>
    <button class="btn-dark-grey" onclick="handleToggleSign()">+/-</button>
    <button class="btn-dark-grey" onclick="appendNumber('0')">0</button>
    <button class="btn-dark-grey" onclick="appendNumber('.')">.</button>
    <button class="btn-orange" onclick="handleEqual()">=</button>
  </div>
</div>

<script>
  let displayValue = "0";
  let isResultState = false;
  let finalTarget = "";
  let waitingForFinalReveal = false;
  let forcedResult = null; // 強制結果變數

  const displayEl = document.getElementById('display');
  const formulaEl = document.getElementById('formula');
  const clearBtn = document.getElementById('btn-clear');
  const magicReadyPattern = /^(\d{6})([+\-])(\d{6})\+(\d{2})$/;

  function toggleSettings() {
    const panel = document.getElementById('settings-panel');
    panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
  }

  function saveSettings() {
    forcedResult = document.getElementById('custom-result').value;
    toggleSettings();
  }

  function formatString(str) {
    return str.replace(/\d+/g, (n) => parseInt(n).toLocaleString('en-US'));
  }

  function updateDisplay(overrideValue = null) {
    displayEl.innerText = formatString(overrideValue !== null ? overrideValue : displayValue);
  }

  function appendNumber(num) {
    if (waitingForFinalReveal) return;
    if (isResultState) { displayValue = num; isResultState = false; formulaEl.classList.remove('visible'); }
    else if (displayValue === "0") displayValue = num;
    else {
      const match = displayValue.match(magicReadyPattern);
      if (match) { triggerMagicPhase1(parseInt(match[1]), parseInt(match[3]), match[2]); return; }
      displayValue += num;
    }
    clearBtn.innerText = "C";
    updateDisplay();
  }

  function handleOperator(op) {
    if (waitingForFinalReveal) return;
    if (['+', '-', '×', '÷'].some(o => displayValue.endsWith(o))) displayValue = displayValue.slice(0, -1) + op;
    else displayValue += op;
    updateDisplay();
  }

  function handleClear() {
    displayValue = "0"; isResultState = false; waitingForFinalReveal = false;
    formulaEl.classList.remove('visible'); clearBtn.innerText = "AC";
    updateDisplay();
  }

  function handleBackspace() {
    if (isResultState) handleClear();
    else {
      displayValue = displayValue.length > 1 ? displayValue.slice(0, -1) : "0";
      updateDisplay();
    }
  }

  function handleEqual() {
    if (waitingForFinalReveal) {
      formulaEl.innerText = formatString(displayValue);
      formulaEl.classList.add('visible');
      displayValue = finalTarget;
      displayEl.classList.add('small-result');
      waitingForFinalReveal = false; isResultState = true;
      updateDisplay();
      return;
    }
    try {
      let formula = displayValue.replace(/×/g, '*').replace(/÷/g, '/');
      displayValue = eval(formula).toString();
      isResultState = true;
      updateDisplay();
    } catch(e) { displayValue = "Error"; updateDisplay(); }
  }

  function triggerMagicPhase1(num1, num2, op) {
    if (forcedResult) {
      finalTarget = forcedResult;
    } else {
      const now = new Date();
      finalTarget = `${now.getMonth() + 1}${now.getDate().toString().padStart(2,'0')}${now.getHours().toString().padStart(2,'0')}${now.getMinutes().toString().padStart(2,'0')}`;
    }
    
    let preCalc = (op === '+') ? (num1 + num2) : (num1 - num2);
    displayValue = `${num1}${op}${num2}+${parseInt(finalTarget) - preCalc}`;
    waitingForFinalReveal = true;
    updateDisplay();
  }

  function handleToggleSign() { if (!isNaN(displayValue) && displayValue !== "0") displayValue = (parseFloat(displayValue) * -1).toString(); updateDisplay(); }
  function fakeOp() {}
</script>
</body>
</html>
